<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Momo ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff9a9e,#fad0c4);overflow:hidden}
.container{background:#fff;padding:30px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.2);width:90%;max-width:400px}
button{padding:12px 25px;font-size:18px;border:none;border-radius:30px;cursor:pointer;margin:10px}
#yes{background:#ff0066;color:#fff}
#no{background:#444;color:#fff;position:absolute}
.heart{position:fixed;top:-20px;color:red;animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-20px)}100%{transform:translateY(110vh);opacity:0}}
</style>
</head>
<body>
<div class="container">
<h1>Hi Momo ❤️</h1>
<p>I Have Something Special To Tell You...<br><br><b>Will You Be Mine Forever?</b><br><br>Love From Bappy ❤️</p>
<button id="yes" onclick="yes()">Yes 💖</button>
<button id="no">No 😅</button>
</div>
<script>
function yes(){
document.body.innerHTML=`<div style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;background:#ff4d6d;color:white;text-align:center;padding:20px">
<h1>❤️ Thank You Momo ❤️</h1>
<video autoplay controls playsinline style="width:90%;max-width:500px;border-radius:15px">
<source src="cat.mp4" type="video/mp4">
</video>
<h2>Love You Forever ❤️</h2><h3>- Bappy</h3></div>`;
}
const no=document.getElementById("no");
no.onmouseover=()=>{no.style.left=Math.random()*(innerWidth-100)+"px";no.style.top=Math.random()*(innerHeight-60)+"px";};
for(let i=0;i<60;i++){let h=document.createElement("div");h.className="heart";h.innerHTML="❤️";h.style.left=Math.random()*100+"vw";h.style.fontSize=(15+Math.random()*20)+"px";h.style.animationDuration=(3+Math.random()*4)+"s";document.body.appendChild(h);}
</script>
</body>
</html>
